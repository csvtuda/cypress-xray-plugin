name: Run plugin tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    # manually triggered

# Required for test results reporting.
permissions:
  checks: write
  pull-requests: write

jobs:
  run-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org/
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run eslint
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage
          retention-days: 1
      - uses: actions/github-script@v9
        if: always()
        with:
          script: |
            const script = require('./.github/comment-test-results.js');
            await script({github, context, core}, 'Unit Tests', ['unit.json'], false);

  run-integration-tests:
    runs-on: ubuntu-latest
    needs: run-unit-tests
    strategy:
      matrix:
        environment: [server, cloud]
        shard: [1, 2, 3]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org/
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:integration
        env:
          CYPRESS_JIRA_API_TOKEN_CLOUD: ${{ secrets.CYPRESS_JIRA_API_TOKEN_CLOUD }}
          CYPRESS_JIRA_PASSWORD_SERVER: ${{ secrets.CYPRESS_JIRA_PASSWORD_SERVER }}
          CYPRESS_JIRA_PROJECT_KEY_CLOUD: ${{ secrets.CYPRESS_JIRA_PROJECT_KEY_CLOUD }}
          CYPRESS_JIRA_PROJECT_KEY_SERVER: ${{ secrets.CYPRESS_JIRA_PROJECT_KEY_SERVER }}
          CYPRESS_JIRA_URL_CLOUD: ${{ secrets.CYPRESS_JIRA_URL_CLOUD }}
          CYPRESS_JIRA_URL_SERVER: ${{ secrets.CYPRESS_JIRA_URL_SERVER }}
          CYPRESS_JIRA_USERNAME_CLOUD: ${{ secrets.CYPRESS_JIRA_USERNAME_CLOUD }}
          CYPRESS_JIRA_USERNAME_SERVER: ${{ secrets.CYPRESS_JIRA_USERNAME_SERVER }}
          CYPRESS_XRAY_CLIENT_ID_CLOUD: ${{ secrets.XRAY_CLIENT_ID }}
          CYPRESS_XRAY_CLIENT_SECRET_CLOUD: ${{ secrets.XRAY_CLIENT_SECRET }}
          INTEGRATION_TESTS_ENVIRONMENT: ${{ matrix.environment }}
          INTEGRATION_TESTS_SHARD_INDEX: ${{ matrix.shard }}
          INTEGRATION_TESTS_SHARD_TOTAL: 3
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-results-${{ matrix.environment }}-${{ matrix.shard }}
          path: integration.json
          retention-days: 1

  aggregate-integration-results:
    runs-on: ubuntu-latest
    needs: run-integration-tests
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: integration-artifacts
          pattern: integration-results-*
      - uses: actions/github-script@v9
        with:
          script: |
            const script = require('./.github/comment-test-results.js');
            await script({github, context, core}, 'Integration Tests', ['integration-artifacts'], true);
